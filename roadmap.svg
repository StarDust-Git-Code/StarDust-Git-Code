<svg width="800" height="150" viewBox="0 0 800 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .label { font-family: 'Fira Code', 'Courier New', monospace; font-size: 13px; font-weight: 600; fill: #C9D1D9; }
    .percentage { font-family: 'Fira Code', 'Courier New', monospace; font-size: 13px; font-weight: 700; fill: #00E5FF; }
    .bg-bar { fill: #161B22; rx: 4px; }
    .glow-border { stroke: #161B22; stroke-width: 1; opacity: 0.8; }
  </style>

  <rect width="100%" height="150" rx="8" fill="#0D1117"/>
  <rect x="1" y="1" width="798" height="148" rx="7" class="glow-border" />

  <!-- ROW 1: ROS2 Humble -->
  <text x="30" y="40" class="label">ROS2 Humble Lifecycle Nodes &amp; Nav2</text>
  <rect x="420" y="28" width="300" height="14" class="bg-bar" />
  <rect x="420" y="28" width="240" height="14" rx="4" fill="url(#cyan-grad)" />
  <text x="735" y="40" class="percentage">80%</text>

  <!-- ROW 2: Custom RTOS -->
  <text x="30" y="80" class="label">Custom RTOS Real-Time Tasks &amp; Thread Sync</text>
  <rect x="420" y="68" width="300" height="14" class="bg-bar" />
  <rect x="420" y="68" width="180" height="14" rx="4" fill="url(#purple-grad)" />
  <text x="735" y="80" class="percentage" style="fill: #9D00FF;">60%</text>

  <!-- ROW 3: Edge AI -->
  <text x="30" y="120" class="label">Edge AI Tensor Optimizations (TFLite C++)</text>
  <rect x="420" y="108" width="300" height="14" class="bg-bar" />
  <rect x="420" y="108" width="105" height="14" rx="4" fill="url(#pink-grad)" />
  <text x="735" y="120" class="percentage" style="fill: #FF007F;">35%</text>

  <!-- Gradients -->
  <defs>
    <linearGradient id="cyan-grad" x1="420" y1="35" x2="660" y2="35" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#00E5FF"/>
    </linearGradient>
    <linearGradient id="purple-grad" x1="420" y1="75" x2="600" y2="75" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9D00FF" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#9D00FF"/>
    </linearGradient>
    <linearGradient id="pink-grad" x1="420" y1="115" x2="525" y2="115" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF007F" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#FF007F"/>
    </linearGradient>
  </defs>
</svg>
